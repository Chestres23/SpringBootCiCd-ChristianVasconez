name: Rollback - Render

on:
  workflow_run:
    workflows: ["CD - Deploy to Render"]
    types:
      - completed

jobs:
  rollback:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Find last successful deploy
        id: last_ok

        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

        run: |
          echo "Buscando último deploy exitoso..."

          RESPONSE=$(curl -s \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=20")

          LAST_OK=$(echo "$RESPONSE" | jq -r '
            [ .[] | select(.status == "live" or .status == "succeeded") ]
            | sort_by(.createdAt)
            | reverse
            | .[0].id
          ')

          if [ -z "$LAST_OK" ] || [ "$LAST_OK" = "null" ]; then
            echo "No existe deploy exitoso."
            exit 1
          fi

          echo "LAST_OK=$LAST_OK" >> $GITHUB_ENV

      - name: Trigger rollback in Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          LAST_OK: ${{ env.LAST_OK }}

        run: |
          echo "Ejecutando rollback..."

          curl -s -X POST \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            --data "{\"deployId\":\"$LAST_OK\"}" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/rollback"

          echo "Rollback enviado."