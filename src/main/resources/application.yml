spring:
    datasource:
        url: jdbc:mysql://localhost:3306/spring_lab?useSSL=false&serverTimezone=UTC
        username: root
        password: admin
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update

        show-sql: true
        properties:
            hibernate:
                format_sql: true

    devtools:
        restart:
            enabled: true

server:
    port: 8080



